version: 2

updates:
  # Monitor GitHub Actions for security and version updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Monitor npm dependencies used by the Playwright test suite
  - package-ecosystem: "npm"
    directory: "/tests"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "testing"
